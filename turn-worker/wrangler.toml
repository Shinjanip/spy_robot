name = "spyrobot-turn"
main = "worker.js"
compatibility_date = "2025-01-01"

# Non-secret vars. Lock ALLOWED_ORIGIN to your dashboard URL in production.
[vars]
TTL = "86400"
# ALLOWED_ORIGIN = "https://your-tunnel-domain.example.com"

# Secrets are NOT stored here — set them with:
#   wrangler secret put TURN_KEY_ID
#   wrangler secret put TURN_KEY_API_TOKEN
