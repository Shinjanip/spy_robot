<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SpyRobot Dashboard</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1f2937;
      --border: #374151;
      --accent: #3b82f6;
      --accent2: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #f9fafb;
      --text2: #9ca3af;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: 48px 1fr;
      grid-template-columns: 1fr;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { font-weight: 700; font-size: 16px; letter-spacing: 1px; }
    .logo span { color: var(--accent); }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text2);
      margin-left: auto;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--danger);
      transition: background 0.3s;
    }
    .dot.online { background: var(--accent2); }
    .dot.mqtt-ok { background: var(--accent2); }

    /* ── Main layout ── */
    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 12px;
      overflow: hidden;
    }
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
    }

    /* ── Video pane ── */
    .video-pane {
      background: #000;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    #video-el {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-overlay {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 8px 12px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }
    .video-badge {
      background: var(--danger); color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px; letter-spacing: 1px;
    }
    .video-badge.live { background: var(--accent2); }
    .video-latency { font-size: 11px; color: rgba(255,255,255,0.7); }
    .video-error {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; color: var(--text2); font-size: 14px;
    }
    .video-error button {
      background: var(--accent); border: none; border-radius: 6px;
      color: #fff; padding: 6px 16px; cursor: pointer; font-size: 13px;
    }

    /* ── Right panel ── */
    .right-panel {
      display: flex; flex-direction: column; gap: 12px;
      grid-row: 1 / 3;
      overflow-y: auto;
    }
    @media (max-width: 768px) {
      .right-panel { grid-row: auto; }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .card-title {
      font-size: 11px; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text2);
      margin-bottom: 12px;
    }

    /* ── Joystick ── */
    .joystick-wrap {
      display: flex; align-items: center; justify-content: center;
      height: 180px;
    }
    #joystick-zone {
      width: 160px; height: 160px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      position: relative; touch-action: none;
      cursor: crosshair;
    }
    #joystick-knob {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--accent);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      transition: none;
      pointer-events: none;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
    }
    .joystick-crosshair {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .joystick-crosshair::before,
    .joystick-crosshair::after {
      content: ''; position: absolute;
      background: var(--border);
    }
    .joystick-crosshair::before { width: 1px; height: 100%; }
    .joystick-crosshair::after  { width: 100%; height: 1px; }

    /* ── Speed slider ── */
    .speed-row { display: flex; align-items: center; gap: 10px; }
    .speed-label { font-size: 12px; color: var(--text2); flex-shrink: 0; }
    input[type=range] {
      flex: 1; accent-color: var(--accent); cursor: pointer;
    }
    #speed-val { font-size: 13px; font-weight: 600; min-width: 36px; text-align: right; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px;
      padding: 8px 14px; cursor: pointer; font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
      flex: 1;
    }
    .btn:hover { background: var(--border); }
    .btn.danger { border-color: var(--danger); color: var(--danger); }
    .btn.danger:hover { background: var(--danger); color: #fff; }
    .btn.active { background: var(--accent); border-color: var(--accent); }

    /* ── Telemetry grid ── */
    .telem-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .telem-cell {
      background: var(--surface2); border-radius: 8px;
      padding: 10px 12px;
    }
    .telem-key { font-size: 10px; color: var(--text2); letter-spacing: 0.5px; }
    .telem-val { font-size: 20px; font-weight: 700; margin-top: 2px; }
    .telem-unit { font-size: 11px; color: var(--text2); font-weight: 400; }

    /* ── Battery bar ── */
    .battery-bar {
      height: 8px; border-radius: 4px;
      background: var(--surface2); margin-top: 8px; overflow: hidden;
    }
    .battery-fill {
      height: 100%; border-radius: 4px;
      background: var(--accent2); transition: width 0.5s, background 0.5s;
    }

    /* ── LiDAR mini display ── */
    .lidar-display {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    canvas#lidar-canvas {
      border-radius: 50%;
      background: #050a14;
      display: block;
    }

    /* ── Log ── */
    #event-log {
      height: 80px; overflow-y: auto;
      font-size: 11px; font-family: monospace;
      color: var(--text2);
      display: flex; flex-direction: column-reverse;
    }
    .log-line { padding: 1px 0; }
    .log-line.warn { color: var(--warning); }
    .log-line.err  { color: var(--danger); }
    .log-line.ok   { color: var(--accent2); }
  </style>
</head>
<body>

<header>
  <div class="logo">SPY<span>ROBOT</span></div>
  <div class="status-badge">
    <span class="dot" id="stream-dot"></span> Stream
    <span class="dot" id="mqtt-dot" style="margin-left:8px"></span> MQTT
    <span id="conn-label" style="font-size:11px;margin-left:4px">connecting…</span>
  </div>
</header>

<main>
  <!-- ── Video ── -->
  <div class="video-pane">
    <video id="video-el" autoplay muted playsinline></video>
    <div class="video-overlay">
      <span class="video-badge" id="live-badge">CONNECTING</span>
      <span class="video-latency" id="latency-label"></span>
    </div>
    <div class="video-error" id="video-error" style="display:none">
      <span>Stream unavailable</span>
      <button onclick="VideoPlayer.connect()">Retry</button>
    </div>
  </div>

  <!-- ── Bottom controls (joystick + extra buttons) ── -->
  <div class="card" style="grid-column:1">
    <div class="card-title">Controls</div>
    <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
      <!-- Joystick -->
      <div class="joystick-wrap">
        <div id="joystick-zone">
          <div class="joystick-crosshair"></div>
          <div id="joystick-knob"></div>
        </div>
      </div>
      <!-- Right of joystick -->
      <div style="flex:1;min-width:180px;display:flex;flex-direction:column;gap:12px">
        <div class="speed-row">
          <span class="speed-label">Speed</span>
          <input type="range" id="speed-slider" min="10" max="100" value="60"
                 oninput="onSpeedChange(this.value)">
          <span id="speed-val">60%</span>
        </div>
        <div class="btn-row">
          <button class="btn danger" onclick="sendStop()">⬛ STOP</button>
          <button class="btn" id="lights-btn" onclick="toggleLights()">💡 Lights</button>
        </div>
        <div class="btn-row">
          <button class="btn" onclick="sendPreset('forward')">↑</button>
          <button class="btn" onclick="sendPreset('back')">↓</button>
          <button class="btn" onclick="sendPreset('left')">←</button>
          <button class="btn" onclick="sendPreset('right')">→</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Right panel ── -->
  <div class="right-panel">

    <!-- Telemetry -->
    <div class="card">
      <div class="card-title">Telemetry</div>
      <div class="telem-grid">
        <div class="telem-cell">
          <div class="telem-key">BATTERY</div>
          <div class="telem-val" id="t-battery">--<span class="telem-unit">%</span></div>
          <div class="battery-bar"><div class="battery-fill" id="battery-fill" style="width:0%"></div></div>
        </div>
        <div class="telem-cell">
          <div class="telem-key">SPEED</div>
          <div class="telem-val" id="t-speed">--<span class="telem-unit">%</span></div>
        </div>
        <div class="telem-cell">
          <div class="telem-key">LEFT MOTOR</div>
          <div class="telem-val" id="t-left">0<span class="telem-unit"></span></div>
        </div>
        <div class="telem-cell">
          <div class="telem-key">RIGHT MOTOR</div>
          <div class="telem-val" id="t-right">0<span class="telem-unit"></span></div>
        </div>
      </div>
    </div>

    <!-- LiDAR -->
    <div class="card">
      <div class="card-title">LiDAR</div>
      <div class="lidar-display">
        <canvas id="lidar-canvas" width="160" height="160"></canvas>
        <div style="display:flex;gap:16px;font-size:12px;color:var(--text2);margin-top:4px">
          <span>F: <strong id="lidar-f">--</strong>cm</span>
          <span>L: <strong id="lidar-l">--</strong>cm</span>
          <span>R: <strong id="lidar-r">--</strong>cm</span>
        </div>
      </div>
    </div>

    <!-- Event log -->
    <div class="card" style="flex:1">
      <div class="card-title">Event log</div>
      <div id="event-log"></div>
    </div>

  </div>
</main>

<!-- MQTT.js from CDN -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIGURATION — update these values for your setup
// ══════════════════════════════════════════════════════════════
const CONFIG = {
  // MediaMTX WHEP endpoint for WebRTC video
  // In dev: direct IP; in prod: via NGINX /stream/ prefix
  whepUrl: 'http://192.168.1.100:8889/spyrobot/live/whep',
  // whepUrl: 'https://yourdomain.com/stream/spyrobot/live/whep',

  // HiveMQ Cloud WebSocket endpoint (WSS required)
  mqttUrl:  'wss://YOUR_CLUSTER.hivemq.cloud:8884/mqtt',
  mqttUser: 'dashboard_user',
  mqttPass: 'YOUR_PASSWORD',

  // Topics
  topics: {
    cmdMove:     'robot/cmd/move',
    cmdSpeed:    'robot/cmd/speed',
    cmdStop:     'robot/cmd/stop',
    cmdCamera:   'robot/cmd/camera',
    telemetry:   'robot/telemetry',
    lidar:       'robot/telemetry/lidar',
    battery:     'robot/telemetry/battery',
    status:      'robot/status',
  },

  // Control
  publishRateMs: 100,   // Send move command at max 10Hz
};

// ══════════════════════════════════════════════════════════════
// WebRTC Video Player (WHEP client)
// Connects to MediaMTX — browser never talks to the RPi directly.
// Survives page refresh because RPi streams independently.
// ══════════════════════════════════════════════════════════════
const VideoPlayer = (() => {
  let pc = null;
  let retryTimer = null;
  let retryDelay = 2000;
  const MAX_RETRY = 30000;

  const videoEl  = document.getElementById('video-el');
  const errorEl  = document.getElementById('video-error');
  const badgeEl  = document.getElementById('live-badge');
  const streamDot = document.getElementById('stream-dot');

  function setStatus(status) {
    const states = {
      connecting: { text: 'CONNECTING', cls: '',      live: false },
      live:       { text: 'LIVE',       cls: 'live',  live: true  },
      error:      { text: 'ERROR',      cls: '',      live: false  },
    };
    const s = states[status] || states.connecting;
    badgeEl.textContent = s.text;
    badgeEl.className   = 'video-badge ' + s.cls;
    streamDot.className = 'dot' + (s.live ? ' online' : '');
    errorEl.style.display = status === 'error' ? 'flex' : 'none';
  }

  async function connect() {
    disconnect();
    setStatus('connecting');
    log('Connecting to video stream…');

    try {
      pc = new RTCPeerConnection({
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          // Add TURN here for production:
          // { urls: 'turn:YOUR_VPS:3478', username: 'spyrobot', credential: 'SECRET' }
        ],
        bundlePolicy: 'max-bundle',
        iceTransportPolicy: 'all',
      });

      // Receive video track
      pc.addTransceiver('video', { direction: 'recvonly' });

      pc.ontrack = (e) => {
        videoEl.srcObject = e.streams[0];
        videoEl.play().catch(() => {});
        setStatus('live');
        retryDelay = 2000;
        log('Video stream active', 'ok');
      };

      pc.oniceconnectionstatechange = () => {
        if (['failed','disconnected'].includes(pc.iceConnectionState)) {
          log('ICE ' + pc.iceConnectionState + ' — retrying…', 'warn');
          scheduleRetry();
        }
      };

      // WHEP: create offer, POST to MediaMTX, get answer
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // Wait for ICE gathering
      await new Promise(resolve => {
        if (pc.iceGatheringState === 'complete') return resolve();
        pc.onicegatheringstatechange = () => {
          if (pc.iceGatheringState === 'complete') resolve();
        };
        setTimeout(resolve, 3000);  // timeout fallback
      });

      const resp = await fetch(CONFIG.whepUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/sdp' },
        body: pc.localDescription.sdp,
      });

      if (!resp.ok) throw new Error(`WHEP ${resp.status}`);

      const answerSdp = await resp.text();
      await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

    } catch (err) {
      log('Stream error: ' + err.message, 'err');
      setStatus('error');
      scheduleRetry();
    }
  }

  function disconnect() {
    if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
    if (pc) { pc.close(); pc = null; }
    videoEl.srcObject = null;
  }

  function scheduleRetry() {
    setStatus('connecting');
    retryTimer = setTimeout(() => connect(), retryDelay);
    retryDelay = Math.min(retryDelay * 1.5, MAX_RETRY);
  }

  // Measure latency via stats API
  setInterval(async () => {
    if (!pc) return;
    try {
      const stats = await pc.getStats();
      stats.forEach(report => {
        if (report.type === 'inbound-rtp' && report.kind === 'video') {
          const jitter = Math.round((report.jitter || 0) * 1000);
          document.getElementById('latency-label').textContent = `jitter ${jitter}ms`;
        }
      });
    } catch (_) {}
  }, 3000);

  return { connect, disconnect };
})();


// ══════════════════════════════════════════════════════════════
// MQTT Control Client
// ══════════════════════════════════════════════════════════════
const MQTTClient = (() => {
  let client = null;
  let lastPublish = 0;
  const mqttDot = document.getElementById('mqtt-dot');
  const connLabel = document.getElementById('conn-label');

  function connect() {
    log('Connecting to MQTT broker…');
    client = mqtt.connect(CONFIG.mqttUrl, {
      username:       CONFIG.mqttUser,
      password:       CONFIG.mqttPass,
      clientId:       'dashboard-' + Math.random().toString(36).slice(2, 8),
      reconnectPeriod: 3000,
      keepalive:       30,
      will: {
        topic:   'robot/dashboard/status',
        payload: JSON.stringify({ online: false }),
        qos: 1,
        retain: false,
      },
    });

    client.on('connect', () => {
      mqttDot.className = 'dot mqtt-ok';
      connLabel.textContent = 'connected';
      log('MQTT connected', 'ok');

      // Subscribe to telemetry
      Object.values(CONFIG.topics).forEach(t => {
        if (t.startsWith('robot/telemetry') || t === CONFIG.topics.status) {
          client.subscribe(t);
        }
      });
    });

    client.on('disconnect', () => {
      mqttDot.className = 'dot';
      connLabel.textContent = 'reconnecting…';
      log('MQTT disconnected', 'warn');
    });

    client.on('error', (err) => {
      log('MQTT error: ' + err.message, 'err');
    });

    client.on('message', (topic, payload) => {
      try {
        const data = JSON.parse(payload.toString());
        onTelemetry(topic, data);
      } catch (_) {}
    });
  }

  function publish(topic, payload, qos = 0) {
    if (!client?.connected) return;
    client.publish(topic, JSON.stringify(payload), { qos });
  }

  function publishMove(x, y) {
    const now = Date.now();
    if (now - lastPublish < CONFIG.publishRateMs) return;
    lastPublish = now;
    publish(CONFIG.topics.cmdMove, { x, y });
  }

  return { connect, publish, publishMove };
})();


// ══════════════════════════════════════════════════════════════
// Telemetry display
// ══════════════════════════════════════════════════════════════
function onTelemetry(topic, data) {
  if (topic === CONFIG.topics.telemetry || topic === CONFIG.topics.battery) {
    const pct = data.battery_pct ?? data.pct ?? null;
    if (pct !== null) {
      document.getElementById('t-battery').innerHTML =
        Math.round(pct) + '<span class="telem-unit">%</span>';
      const fill = document.getElementById('battery-fill');
      fill.style.width = pct + '%';
      fill.style.background = pct > 50 ? 'var(--accent2)' :
                               pct > 20 ? 'var(--warning)' : 'var(--danger)';
    }
    if (data.speed_pct !== undefined) {
      document.getElementById('t-speed').innerHTML =
        Math.round(data.speed_pct) + '<span class="telem-unit">%</span>';
    }
    if (data.motor_left !== undefined) {
      document.getElementById('t-left').textContent = Math.round(data.motor_left);
      document.getElementById('t-right').textContent = Math.round(data.motor_right);
    }
  }

  if (topic === CONFIG.topics.lidar) {
    const { front_cm, left_cm, right_cm } = data;
    document.getElementById('lidar-f').textContent = front_cm;
    document.getElementById('lidar-l').textContent = left_cm;
    document.getElementById('lidar-r').textContent = right_cm;
    drawLidar(front_cm, left_cm, right_cm);
  }
}

function drawLidar(front, left, right) {
  const canvas = document.getElementById('lidar-canvas');
  const ctx = canvas.getContext('2d');
  const cx = 80, cy = 80, maxDist = 300;
  ctx.clearRect(0, 0, 160, 160);

  // Grid rings
  ctx.strokeStyle = '#1f3a5f';
  ctx.lineWidth = 0.5;
  [40, 60, 80].forEach(r => {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  });

  // Robot body
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.fill();

  // Direction indicator
  ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - 14); ctx.stroke();

  // LiDAR readings as colored dots
  const readings = [
    { dist: front, angle: -Math.PI/2, color: '#10b981' },   // front = up
    { dist: left,  angle: Math.PI,    color: '#f59e0b' },    // left
    { dist: right, angle: 0,          color: '#f59e0b' },    // right
  ];

  readings.forEach(({ dist, angle, color }) => {
    const scale = 80 / maxDist;
    const r = Math.min(dist * scale, 78);
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;

    // Line from center
    ctx.strokeStyle = color + '55';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();

    // Dot at distance
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
  });
}


// ══════════════════════════════════════════════════════════════
// Joystick controller
// ══════════════════════════════════════════════════════════════
const Joystick = (() => {
  const zone  = document.getElementById('joystick-zone');
  const knob  = document.getElementById('joystick-knob');
  const R     = 80;   // zone radius
  const DEAD  = 8;    // dead zone px

  let active  = false;
  let originX = 0, originY = 0;
  let curX    = 0, curY    = 0;
  let raf     = null;

  function getCenter() {
    const rect = zone.getBoundingClientRect();
    return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
  }

  function onStart(e) {
    active = true;
    const center = getCenter();
    originX = center.x; originY = center.y;
    onMove(e);
  }

  function onMove(e) {
    if (!active) return;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - originX;
    const dy = pt.clientY - originY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const clamped = Math.min(dist, R);
    const angle = Math.atan2(dy, dx);
    curX = Math.cos(angle) * clamped;
    curY = Math.sin(angle) * clamped;
    knob.style.transform = `translate(calc(-50% + ${curX}px), calc(-50% + ${curY}px))`;
    e.preventDefault();
  }

  function onEnd() {
    active = false;
    curX = 0; curY = 0;
    knob.style.transform = 'translate(-50%, -50%)';
    knob.style.transition = 'transform 0.15s';
    setTimeout(() => { knob.style.transition = 'none'; }, 150);
    MQTTClient.publishMove(0, 0);  // explicit stop
  }

  // Publish loop at CONFIG.publishRateMs
  function pubLoop() {
    if (active) {
      const x =  (Math.abs(curX) > DEAD ? curX / R : 0);
      const y = -(Math.abs(curY) > DEAD ? curY / R : 0); // invert Y (up = forward)
      MQTTClient.publishMove(x, y);
    }
    raf = setTimeout(pubLoop, CONFIG.publishRateMs);
  }

  zone.addEventListener('mousedown',  onStart);
  zone.addEventListener('mousemove',  onMove);
  zone.addEventListener('mouseup',    onEnd);
  zone.addEventListener('mouseleave', onEnd);
  zone.addEventListener('touchstart', onStart, { passive: false });
  zone.addEventListener('touchmove',  onMove,  { passive: false });
  zone.addEventListener('touchend',   onEnd);

  pubLoop();
})();


// ══════════════════════════════════════════════════════════════
// Button handlers
// ══════════════════════════════════════════════════════════════
function sendStop() {
  MQTTClient.publish(CONFIG.topics.cmdStop, { reason: 'manual' }, 1);
  log('Emergency stop sent', 'warn');
}

function onSpeedChange(val) {
  document.getElementById('speed-val').textContent = val + '%';
  MQTTClient.publish(CONFIG.topics.cmdSpeed, { speed: parseInt(val) });
}

let lightsOn = false;
function toggleLights() {
  lightsOn = !lightsOn;
  const btn = document.getElementById('lights-btn');
  btn.className = 'btn' + (lightsOn ? ' active' : '');
  MQTTClient.publish(CONFIG.topics.cmdCamera, { lights: lightsOn });
}

function sendPreset(dir) {
  const presets = {
    forward: { x: 0,    y: 0.7  },
    back:    { x: 0,    y: -0.7 },
    left:    { x: -0.7, y: 0    },
    right:   { x:  0.7, y: 0    },
  };
  const p = presets[dir];
  if (p) MQTTClient.publishMove(p.x, p.y);
}


// ══════════════════════════════════════════════════════════════
// Event log
// ══════════════════════════════════════════════════════════════
function log(msg, level = '') {
  const el = document.getElementById('event-log');
  const line = document.createElement('div');
  line.className = 'log-line ' + level;
  const time = new Date().toLocaleTimeString('en', { hour12: false });
  line.textContent = `[${time}] ${msg}`;
  el.prepend(line);
  if (el.children.length > 50) el.removeChild(el.lastChild);
}


// ══════════════════════════════════════════════════════════════
// Keyboard control (desktop)
// ══════════════════════════════════════════════════════════════
const keysHeld = new Set();
setInterval(() => {
  let x = 0, y = 0;
  if (keysHeld.has('ArrowUp')    || keysHeld.has('w')) y =  0.8;
  if (keysHeld.has('ArrowDown')  || keysHeld.has('s')) y = -0.8;
  if (keysHeld.has('ArrowLeft')  || keysHeld.has('a')) x = -0.6;
  if (keysHeld.has('ArrowRight') || keysHeld.has('d')) x =  0.6;
  if (x !== 0 || y !== 0) MQTTClient.publishMove(x, y);
}, CONFIG.publishRateMs);

document.addEventListener('keydown', e => {
  keysHeld.add(e.key);
  if (e.key === ' ') { e.preventDefault(); sendStop(); }
});
document.addEventListener('keyup', e => {
  keysHeld.delete(e.key);
  if (!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].some(k => keysHeld.has(k))) {
    MQTTClient.publishMove(0, 0);
  }
});


// ══════════════════════════════════════════════════════════════
// Startup
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  VideoPlayer.connect();
  MQTTClient.connect();
  log('Dashboard initialized', 'ok');

  // Reconnect video on page visibility (tab switch back)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      log('Tab active — checking stream…');
      setTimeout(() => VideoPlayer.connect(), 500);
    }
  });
});
</script>
