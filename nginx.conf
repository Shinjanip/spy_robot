###############################################################
# NGINX configuration — SpyRobot
# Reverse proxy for MediaMTX WebRTC/HLS + dashboard serving
###############################################################

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # ── Upstream: MediaMTX ───────────────────────────────────
    upstream mediamtx_webrtc {
        server 127.0.0.1:8889;
    }

    upstream mediamtx_hls {
        server 127.0.0.1:8888;
    }

    upstream mediamtx_api {
        server 127.0.0.1:9997;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN.com;      # ← change to your domain

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check endpoint (for Docker healthcheck)
        location /health {
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Dev: HTTP-only server (no TLS on laptop) ─────────────
    # Comment this out in production and use the HTTPS block below.
    server {
        listen 80 default_server;
        server_name _;

        # CORS headers for WebRTC WHEP
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PATCH, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Dashboard (built React app)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;   # SPA routing
        }

        # Health check
        location /health {
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Proxy MediaMTX WebRTC (WHEP endpoint)
        # Browser accesses: /stream/spyrobot/live/whep
        location /stream/ {
            proxy_pass         http://mediamtx_webrtc/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
            proxy_buffering    off;             # Critical for streaming
        }

        # Proxy MediaMTX HLS
        location /hls/ {
            proxy_pass         http://mediamtx_hls/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_buffering    off;
            proxy_cache        off;
            add_header Cache-Control no-cache;
        }

        # MediaMTX API (restrict in prod)
        location /api/stream/ {
            proxy_pass http://mediamtx_api/v3/;
            proxy_set_header Host $host;
        }
    }

    # ── PRODUCTION: HTTPS server ─────────────────────────────
    # Uncomment this block and comment the HTTP server above for prod.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name YOUR_DOMAIN.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # CORS for WebRTC
    #     add_header Access-Control-Allow-Origin  "https://YOUR_DOMAIN.com" always;
    #     add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PATCH, DELETE" always;
    #
    #     location / {
    #         root /usr/share/nginx/html;
    #         index index.html;
    #         try_files $uri $uri/ /index.html;
    #     }
    #
    #     location /stream/ {
    #         proxy_pass         http://mediamtx_webrtc/;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade $http_upgrade;
    #         proxy_set_header   Connection "upgrade";
    #         proxy_set_header   Host $host;
    #         proxy_buffering    off;
    #     }
