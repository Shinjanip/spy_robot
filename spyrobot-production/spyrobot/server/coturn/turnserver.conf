# ============================================================
# Coturn TURN Server Configuration — SpyRobot
#
# TURN is needed when browser viewers are behind strict NAT
# (corporate firewall, CGNAT, etc.)
#
# Replace placeholders before deploying to VPS.
# ============================================================

# ── Network ──────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# Your VPS public IP — REQUIRED
external-ip=YOUR_VPS_PUBLIC_IP

# Relay address range (restrict to your VPS IP range)
relay-ip=YOUR_VPS_PUBLIC_IP

# ── Credentials ──────────────────────────────────────────────
# Must match what you put in mediamtx.yml and the dashboard config
realm=spyrobot.yourdomain.com
lt-cred-mech

# Static credentials (dev/small prod)
# For a larger deployment, use a REST API for ephemeral credentials
user=spyrobot:YOUR_TURN_SECRET

# ── TLS (production) ────────────────────────────────────────
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# ── UDP port range for media relay ──────────────────────────
min-port=49152
max-port=65535

# ── Security ─────────────────────────────────────────────────
no-multicast-peers
no-loopback-peers
fingerprint
mobility

# ── Logging ──────────────────────────────────────────────────
log-file=/var/log/coturn/turnserver.log
simple-log
verbose

# ── Rate limiting ────────────────────────────────────────────
# Limit allocation bandwidth (prevent relay abuse)
max-bps=10000000        # 10 Mbps per allocation
total-quota=100         # Max simultaneous TURN allocations
